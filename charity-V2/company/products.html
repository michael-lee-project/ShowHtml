<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理 — 美心食品集团 | 慈商联营</title>
<link rel="stylesheet" href="../public/css/style.css">
<link rel="stylesheet" href="../public/css/dashboard.css">
<style>
  .product-mng { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 20px; }
  .product-mng-row { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--color-border-light); align-items: center; }
  .product-mng-row:last-child { border-bottom: none; }
  .product-mng-row .cover { width: 80px; height: 80px; border-radius: 10px; background: var(--color-bg-alt); display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; }
  .product-mng-row .info { flex: 1; }
  .product-mng-row .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .product-mng-row .meta { font-size: 12px; color: var(--color-text-3); display: flex; gap: 12px; flex-wrap: wrap; }
  .product-mng-row .actions { display: flex; gap: 8px; }

  .shop-stat { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .shop-stat .item { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius); padding: 20px; text-align: center; }
  .shop-stat .item .num { font-size: 28px; font-weight: 800; color: var(--color-primary); }
  .shop-stat .item .lbl { font-size: 12px; color: var(--color-text-3); margin-top: 4px; }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="dash-wrap">
  <div id="dash-side"></div>
  <main class="dash-main">
    <div class="dash-head">
      <div>
        <h1>🛒 商品管理</h1>
        <div class="sub">管理慈善商城中"美心食品旗舰店"的所有商品</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost">📥 批量导入</button>
        <button class="btn btn-primary">+ 发布新商品</button>
      </div>
    </div>

    <div class="alert alert-info">
      <span class="ic">💡</span>
      <div>
        <strong>温馨提示：</strong>商城中所有商品每单自动捐赠订单额的 5%。商品图片建议 800×800 像素，描述需真实准确，平台会进行资质审核。
      </div>
    </div>

    <div class="shop-stat">
      <div class="item">
        <div class="num">26</div>
        <div class="lbl">在售商品</div>
      </div>
      <div class="item">
        <div class="num">8,620</div>
        <div class="lbl">本月销量</div>
      </div>
      <div class="item">
        <div class="num">¥ 286,500</div>
        <div class="lbl">本月销售额</div>
      </div>
      <div class="item">
        <div class="num">¥ 1,432.5</div>
        <div class="lbl">本月已捐赠</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active">在售 <span class="count">26</span></div>
      <div class="tab">已下架 <span class="count">3</span></div>
      <div class="tab">草稿箱 <span class="count">2</span></div>
      <div class="tab">审核中 <span class="count">1</span></div>
    </div>

    <div class="product-mng" id="product-list"></div>
  </main>
</div>

<script src="../public/js/common.js"></script>
<script>
  CS.renderDashHeader('企业', '李经理');
  CS.renderSidebar('company', 'products');

  // 渲染产品列表（数据来自 common.js 的 PRODUCTS_DATA）
  function renderProducts() {
    const list = document.getElementById('product-list');
    if (!list) return;
    list.innerHTML = CS.PRODUCTS_DATA.map(p => `
      <div class="product-mng-row" data-id="${p.id}">
        <div class="cover" style="background:linear-gradient(135deg,#FFE4D2,#FAEFD9);">${p.cover}</div>
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="meta">
            <span>分类：${p.category}</span>
            <span>原价：¥ ${p.originalPrice}</span>
            <span>售价：¥ ${p.salePrice}</span>
            <span>库存：${p.stock.toLocaleString()}</span>
            <span class="tag tag-success">在售</span>
            ${p.tags.map(t => `<span class="tag ${t==='爆款'?'tag-primary':t==='新品'?'tag-gold':'tag-warning'}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="text-right">
          <div class="text-sm text-muted">月销</div>
          <div class="fw-700 text-primary">${p.monthlySales.toLocaleString()}</div>
        </div>
        <div class="actions">
          <button class="btn btn-ghost btn-sm">编辑</button>
          <button class="btn btn-ghost btn-sm">下架</button>
        </div>
      </div>
    `).join('');
  }
  renderProducts();
</script>
</body>
</html>

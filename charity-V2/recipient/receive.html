<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码领取物资 — 李华 | 慈商联营</title>
<link rel="stylesheet" href="../public/css/style.css">
<link rel="stylesheet" href="../public/css/dashboard.css">
<style>
  .scan-hero {
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-gold) 100%);
    color: #fff; border-radius: var(--radius-lg); padding: 48px;
    text-align: center; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .scan-hero::after {
    content: ''; position: absolute; right: -80px; bottom: -80px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .scan-area-big {
    background: #fff; width: 240px; height: 240px; border-radius: var(--radius-lg);
    margin: 24px auto; display: flex; align-items: center; justify-content: center;
    color: var(--color-primary); font-size: 100px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .scan-area-big::before, .scan-area-big::after {
    content: ''; position: absolute; width: 32px; height: 32px;
    border: 4px solid var(--color-primary);
  }
  .scan-area-big::before { top: 16px; left: 16px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
  .scan-area-big::after { bottom: 16px; right: 16px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
  .scan-line {
    position: absolute; top: 20px; left: 20px; right: 20px;
    height: 3px; background: var(--color-primary);
    box-shadow: 0 0 12px var(--color-primary);
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(200px); }
  }

  .manual-section { max-width: 480px; margin: 0 auto; }
  .manual-section .form-control { font-size: 16px; padding: 14px; }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="dash-wrap">
  <div id="dash-side"></div>
  <main class="dash-main">
    <div class="dash-head">
      <div>
        <h1>📱 扫码领取物资</h1>
        <div class="sub">扫描志愿者出示的二维码，确认领取</div>
      </div>
      <a href="dashboard.html" class="btn btn-ghost">← 返回</a>
      <a href="../pages/track.html" class="btn btn-primary" style="margin-left:8px;">🔍 物资来自哪里？</a>
    </div>

    <div class="scan-hero">
      <h2 style="font-size:24px;margin-bottom:8px;">将二维码对准扫描框</h2>
      <p style="opacity:0.9;">志愿者出示的物资专属二维码</p>
      <div class="scan-area-big">
        <span>📷</span>
        <div class="scan-line"></div>
      </div>
      <button class="btn btn-lg" style="background:#fff;color:var(--color-primary);font-weight:700;">🔦 打开手电筒</button>
    </div>

    <div class="dash-card manual-section">
      <h3 class="mb-3" style="font-size:18px;">📝 手动输入编号</h3>
      <p class="text-muted text-sm mb-3">如不便扫码，可输入物资编号完成领取</p>
      <div class="form-group">
        <label class="form-label">物资编号 / 订单号</label>
        <input type="text" class="form-control" placeholder="例：CC-DONATE-2025-0682-0001-0086">
      </div>
      <div class="form-group">
        <label class="form-label">您的手机号（验证身份）</label>
        <input type="text" class="form-control" placeholder="11 位手机号" value="138****8888">
      </div>
      <button class="btn btn-primary btn-block btn-lg">确认领取 →</button>
    </div>

    <div class="alert alert-info mt-6">
      <span class="ic">💡</span>
      <div>
        <strong>领取说明：</strong><br>
        · 每件物资有唯一二维码，扫码后将自动记录领取信息<br>
        · 领取后请当面与志愿者确认物资完整性<br>
        · 您可对本次领取进行反馈，帮助平台持续改进
      </div>
    </div>
  </main>
</div>

<script src="../public/js/common.js"></script>
<script>
  CS.renderDashHeader('受捐者', '李华');
  CS.renderSidebar('recipient', 'receive');
</script>
</body>
</html>

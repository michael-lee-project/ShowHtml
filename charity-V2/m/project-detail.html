/* ===== 项目详情 H5 样式 ===== */

.h5-detail-hero {
  padding: 14px 16px 16px;

.h5-detail-hero .top-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.h5-detail-hero .cat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; color: #fff;
}
.h5-detail-hero .urgent-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 6px;
  font-size: 11px; font-weight: 800; color: #7F1D1D;
  background: #FEF3C7;
}
.h5-detail-hero .urgent-badge .dot {
  width: 5px; height: 5px; background: #DC2626;
  border-radius: 50%; animation: dpulse 1.6s infinite;
}
@keyframes dpulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  50% { box-shadow: 0 0 0 4px rgba(220,38,38,0); }
}
.h5-detail-hero h1 {
  font-size: 18px; font-weight: 800; line-height: 1.3;
  margin-bottom: 6px; color: var(--h5-text);
}
.h5-detail-hero .org-row {
  font-size: 12px; color: var(--h5-text-2); margin-bottom: 2px;
}
.h5-detail-hero .region-row {
  font-size: 12px; color: var(--h5-text-3);
}
.h5-detail-hero .hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 12px;
}
.h5-detail-hero .hstat {
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 10px; padding: 10px 8px; text-align: center;
}
.h5-detail-hero .hstat .v {
  font-size: 15px; font-weight: 800; line-height: 1.1; margin-bottom: 3px;
}
.h5-detail-hero .hstat .l { font-size: 10px; color: var(--h5-text-3); }
.h5-detail-hero .progress-card {
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 12px; padding: 12px; margin-top: 12px;
}
.h5-detail-hero .pc-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
.h5-detail-hero .pct-big { font-size: 22px; font-weight: 900; line-height: 1; }
.h5-detail-hero .raised-text { font-size: 11px; color: var(--h5-text-3); }
.h5-detail-hero .pbar { height: 8px; background: rgba(0,0,0,0.08); border-radius: 4px; overflow: hidden; }
.h5-detail-hero .pfill { height: 100%; border-radius: 4px; }

/* 物资用途构成 */
.h5-usage-section { padding: 16px; }
.h5-section-hd {
  font-size: 14px; font-weight: 700; color: var(--h5-text);
  margin-bottom: 12px;
}
.h5-usage-bars { }
.h5-usage-item {
  margin-bottom: 10px;
}
.h5-usage-item .u-head {
  display: flex; justify-content: space-between; margin-bottom: 4px;
}
.h5-usage-item .u-type { font-size: 12px; font-weight: 600; color: var(--h5-text); }
.h5-usage-item .u-val { font-size: 12px; font-weight: 700; }
.h5-usage-item .u-bar {
  height: 6px; background: var(--h5-border); border-radius: 3px; overflow: hidden;
}
.h5-usage-item .u-fill { height: 100%; border-radius: 3px; }

/* 受益人 */
.h5-beneficiary { padding: 0 16px 16px; }
.h5-bene-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.h5-bene-item {
  background: var(--h5-card); border: 1px solid var(--h5-border);
  border-radius: 10px; padding: 10px 6px; text-align: center;
}
.h5-bene-item .ic { font-size: 20px; margin-bottom: 4px; }
.h5-bene-item .n { font-size: 14px; font-weight: 700; color: var(--h5-text); line-height: 1.1; }
.h5-bene-item .l { font-size: 10px; color: var(--h5-text-3); margin-top: 2px; }

/* 时间轴 */
.h5-timeline { padding: 0 16px 16px; }
.h5-tl { position: relative; padding-left: 20px; }
.h5-tl::before {
  content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
  width: 2px; background: var(--h5-divider);
}
.h5-tl-item { position: relative; margin-bottom: 16px; }
.h5-tl-item::before {
  content: ''; position: absolute; left: -17px; top: 5px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--h5-border); border: 2px solid var(--h5-card);
}
.h5-tl-item.latest::before { background: var(--cat-c, var(--h5-primary)); }
.h5-tl-item .tl-date { font-size: 10px; color: var(--h5-text-3); margin-bottom: 2px; }
.h5-tl-item .tl-text { font-size: 12px; color: var(--h5-text); line-height: 1.5; }

/* 反馈 */

.h5-fb-card {
  background: var(--h5-card); border: 1px solid var(--h5-border);
  border-radius: var(--h5-radius); padding: 12px 14px; margin-bottom: 10px;

.h5-fb-card .fb-head { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
.h5-fb-card .fb-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.h5-fb-card .fb-meta { flex: 1; }
.h5-fb-card .fb-name { font-size: 13px; font-weight: 700; color: var(--h5-text); }
.h5-fb-card .fb-from { font-size: 11px; color: var(--h5-text-3); }
.h5-fb-card .fb-body {
  font-size: 12px; color: var(--h5-text-2); line-height: 1.7;
  padding: 8px 10px; background: var(--h5-bg); border-radius: 8px;
}
.h5-fb-card .fb-priv { font-size: 10px; color: var(--h5-text-3); margin-top: 5px; text-align: right; }

/* 底部 CTA */
.h5-detail-cta {
  position: fixed; bottom: 56px; left: 0; right: 0;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
  border-top: 1px solid var(--h5-divider);
  padding: 10px 16px;
  display: flex; gap: 10px; z-index: 50;

.h5-detail-cta .cta-btn {

.h5-detail-cta .cta-primary { background: var(--cat-c, var(--h5-primary)); color: #fff; }

/* 响应后隐藏 bottom padding */

      goal: 1000, raised: 500, urgent: false,
      timeline: [
        { t: '2026-01-01', d: '项目启动' },
        { t: '2026-06-01', d: '持续推进中' },
      ],
      funds: [
        { type: '物资', pct: 100, val: '—', color: '#14B8A6' },
      ],
      beneficiaries: [
        { icon: '👨‍👩‍👧', n: '—', l: '受惠家庭' },
        { icon: '👴', n: '—', l: '受惠老人' },
        { icon: '🧒', n: '—', l: '受惠儿童' },
        { icon: '🤝', n: '—', l: '志愿者' },
      ],
      thanks: [],
    };
  }

  var id = new URLSearchParams(location.search).get('id') || 'p-em-001';
  var p = getProject(id);
  var cat = CATS[p.cat] || CATS.longterm;
  var pct = Math.min(100, Math.round((p.raised / p.goal) * 100));

  // Apply cat color to body
  document.documentElement.style.setProperty('--cat-c', cat.c1);
  document.querySelector('.h5-detail-cta').style.setProperty('--cat-c', cat.c1);
  document.querySelectorAll('.cta-btn').forEach(function (btn) {
    btn.style.setProperty('--cat-c', cat.c1);
  });

  // Hero
  document.getElementById('hero').innerHTML =
    '<div class="top-row">' +
      '<span class="cat-badge" style="background:' + cat.c1 + ';">' + cat.name + '</span>' +
      (p.urgent ? '<span class="urgent-badge"><span class="dot"></span>紧急中</span>' : '') +
    '</div>' +
    '<h1>' + p.name + '</h1>' +
    '<div class="org-row">🏛️ ' + p.org + '</div>' +
    '<div class="region-row">📍 ' + p.region + '</div>' +
    '<div class="hero-stats">' +
      '<div class="hstat"><div class="v" style="color:' + cat.c1 + ';">' + p.statDonate + '</div><div class="l">物资捐赠</div></div>' +
      '<div class="hstat"><div class="v" style="color:' + cat.c1 + ';">' + p.statPeople + '</div><div class="l">受惠人数</div></div>' +
      '<div class="hstat"><div class="v" style="color:' + cat.c1 + ';">' + p.statSpeed + '</div><div class="l">响应时效</div></div>' +
    '</div>' +
    '<div class="progress-card">' +
      '<div class="pc-head">' +
        '<div class="pct-big" style="color:' + cat.c1 + ';">' + pct + '%</div>' +
        '<div class="raised-text">' + p.raised.toLocaleString() + ' / ' + p.goal.toLocaleString() + ' 件</div>' +
      '</div>' +
      '<div class="pbar"><div class="pfill" style="width:' + pct + '%;background:' + cat.c1 + ';"></div></div>' +
    '</div>';

  // Share modal content
  document.getElementById('shareTitle').textContent = p.name;
  document.getElementById('shareRegion').textContent = '📍 ' + p.region;
  document.getElementById('shareDesc').textContent = p.story || p.name + '，' + p.statDonate + '物资已送达 ' + p.statPeople + ' 受惠人群。';

  // Usage bars
  document.getElementById('usageBars').innerHTML = p.funds.map(function (f) {
    return '<div class="h5-usage-item">' +
      '<div class="u-head">' +
        '<span class="u-type">' + f.type + '</span>' +
        '<span class="u-val" style="color:' + (f.color || cat.c1) + ';">' + f.pct + '% · ' + f.val + '</span>' +
      '</div>' +
      '<div class="u-bar"><div class="u-fill" style="width:' + f.pct + '%;background:' + (f.color || cat.c1) + ';"></div></div>' +
    '</div>';
  }).join('');

  // Beneficiaries
  document.getElementById('beneGrid').innerHTML = p.beneficiaries.map(function (b) {
    return '<div class="h5-bene-item">' +
      '<div class="ic">' + b.icon + '</div>' +
      '<div class="n">' + b.n + '</div>' +
      '<div class="l">' + b.l + '</div>' +
    '</div>';
  }).join('');

  // Timeline
  var tlHtml = p.timeline.map(function (item, i) {
    var isLast = i === p.timeline.length - 1;
    return '<div class="h5-tl-item' + (isLast ? ' latest' : '') + '">' +
      '<div class="tl-date">' + item.t + '</div>' +
      '<div class="tl-text">' + item.d + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('tl').innerHTML = tlHtml;

  // Feedback
  if (p.thanks && p.thanks.length > 0) {
    document.getElementById('fbList').innerHTML = p.thanks.map(function (f) {
      return '<div class="h5-fb-card">' +
        '<div class="fb-head">' +
          '<div class="fb-avatar" style="background:' + f.avatar + ';">' + f.avatarTxt + '</div>' +
          '<div class="fb-meta">' +
            '<div class="fb-name">' + f.name + '</div>' +
            '<div class="fb-from">' + f.from + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="fb-body">"' + f.body + '"</div>' +
        '<div class="fb-priv">✓ ' + f.priv + '</div>' +
      '</div>';
    }).join('');
  } else {
    document.getElementById('fbSection').style.display = 'none';
  }

  // Update clock
  function updateClock() {
    var now = new Date();
    document.getElementById('statusTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // GSAP entrance
  if (window.gsap) {
    gsap.fromTo('.h5-detail-hero', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' });
    gsap.fromTo('.h5-usage-item', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3, stagger: 0.05, ease: 'power2.out', delay: 0.3 });
    gsap.fromTo('.h5-tl-item', { x: -10, opacity: 0 }, { x: 0, opacity: 1, duration: 0.3, stagger: 0.08, ease: 'power2.out', delay: 0.4 });
    gsap.fromTo('.h5-fb-card', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3, stagger: 0.1, ease: 'power2.out', delay: 0.5 });
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>

<title>我的 — 慈商联营</title>
<link rel="stylesheet" href="public/css/h5.css">
<style>
  /* profile hero */
  .h5-profile-hero {
    padding: 56px 16px 28px;
    color: #fff;
    background: linear-gradient(135deg, var(--h5-primary) 0%, var(--h5-primary-deep) 100%);
    position: relative;
  }
  .h5-profile-hero::before {
    content: "";
    position: absolute; top: -40px; right: -20px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .h5-profile-hero::after {
    content: "";
    position: absolute; bottom: -20px; left: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .h5-profile-info {
    display: flex; align-items: center; gap: 14px;
    position: relative;
  }
  .h5-profile-info .av {
    width: 64px; height: 64px;
    border-radius: 32px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700;
    flex-shrink: 0;
  }
  .h5-profile-info .body { flex: 1; min-width: 0; }
  .h5-profile-info .name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .h5-profile-info .sub { font-size: 12px; opacity: 0.85; }
  .h5-profile-info .edit {
    width: 32px; height: 32px;
    border-radius: 16px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    cursor: pointer;
  }

  /* 数据 strip */
  .h5-stats-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 14px 0;
    margin: 16px 0 0;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .h5-stats-strip .it {
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.2);
  }
  .h5-stats-strip .it:last-child { border-right: 0; }
  .h5-stats-strip .v { font-size: 18px; font-weight: 700; }
  .h5-stats-strip .l { font-size: 10px; opacity: 0.85; margin-top: 2px; }

  /* 菜单卡 */
  .h5-menu-card {
    background: var(--h5-card);
    border-radius: 14px;
    margin: 12px 16px 0;
    padding: 0 14px;
  }
  .h5-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--h5-divider);
  }
  .h5-menu-item:last-child { border-bottom: 0; }
  .h5-menu-item .ic {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .h5-menu-item .body { flex: 1; min-width: 0; }
  .h5-menu-item .t { font-size: 14px; font-weight: 500; }
  .h5-menu-item .d { font-size: 11px; color: var(--h5-text-3); margin-top: 2px; }
  .h5-menu-item .r { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--h5-text-3); }
  .h5-menu-item .red { color: var(--h5-danger); }
  .h5-menu-item .arrow { font-size: 18px; color: var(--h5-text-3); }

  /* 切角色按钮 */
  .h5-role-switcher {
    margin: 12px 16px 0;
    background: var(--h5-card);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .h5-role-switcher .body { flex: 1; }
  .h5-role-switcher .t { font-size: 13px; font-weight: 500; }
  .h5-role-switcher .d { font-size: 11px; color: var(--h5-text-3); margin-top: 2px; }
</style>

        <div onclick="location.href='profile.html?role=company'" style="padding:14px;border-radius:10px;background:rgba(232,93,4,0.06);cursor:pointer;">
          <div style="font-size:24px;margin-bottom:4px;">🏢</div>
          <div style="font-size:13px;font-weight:600;">企业</div>
          <div style="font-size:11px;color:var(--h5-text-3);">美心食品</div>
        </div>
        <div onclick="location.href='profile.html?role=charity'" style="padding:14px;border-radius:10px;background:rgba(14,90,111,0.06);cursor:pointer;">
          <div style="font-size:24px;margin-bottom:4px;">🏛</div>
          <div style="font-size:13px;font-weight:600;">慈善会</div>
          <div style="font-size:11px;color:var(--h5-text-3);">广东省慈善总会</div>
        </div>
        <div onclick="location.href='profile.html?role=org'" style="padding:14px;border-radius:10px;background:rgba(196,132,42,0.08);cursor:pointer;">
          <div style="font-size:24px;margin-bottom:4px;">🏢</div>
          <div style="font-size:13px;font-weight:600;">社会组织</div>
          <div style="font-size:11px;color:var(--h5-text-3);">深圳壹基金</div>
        </div>
        <div onclick="location.href='profile.html?role=volunteer'" style="padding:14px;border-radius:10px;background:rgba(20,184,166,0.06);cursor:pointer;">
          <div style="font-size:24px;margin-bottom:4px;">🙋</div>
          <div style="font-size:13px;font-weight:600;">志愿者</div>
          <div style="font-size:11px;color:var(--h5-text-3);">张伟</div>
        </div>
        <div onclick="location.href='profile.html?role=recipient'" style="padding:14px;border-radius:10px;background:rgba(124,58,237,0.06);cursor:pointer;grid-column:span 2;">
          <div style="font-size:24px;margin-bottom:4px;">🎁</div>
          <div style="font-size:13px;font-weight:600;">受捐者</div>
          <div style="font-size:11px;color:var(--h5-text-3);">李华 · 五华县水寨镇</div>
        </div>
      </div>
    `;
    H5.openModal('tipModal');
  }
  function confirmExit() {
    document.getElementById('tipTitle').textContent = '退出登录';
    document.getElementById('tipBody').innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:48px;margin-bottom:16px;">🚪</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">确定要退出登录吗？</div>
        <div style="font-size:13px;color:var(--h5-text-3);margin-bottom:20px;">退出后部分数据将不会保留</div>
        <div style="display:flex;gap:10px;">
          <button class="h5-btn h5-btn-ghost h5-btn-block" onclick="H5.closeModal('tipModal')">取消</button>
          <button class="h5-btn h5-btn-primary h5-btn-block" onclick="location.href='login.html'">确定退出</button>
        </div>
      </div>
    `;
    H5.openModal('tipModal');
  }
  function openTip(t, d) {
    document.getElementById('tipTitle').textContent = t;
    document.getElementById('tipBody').innerHTML =
      `<div style="text-align:center;font-size:14px;line-height:1.7;">
        <div style="font-size:48px;margin-bottom:16px;">📋</div>
        <div style="font-weight:600;margin-bottom:8px;">${t}</div>
        ${d ? `<div style="font-size:13px;color:var(--h5-text-3);">${d}</div>` : ''}
        <button class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" style="margin-top:20px;" onclick="H5.closeModal('tipModal')">知道了</button>
      </div>`;
    H5.openModal('tipModal');
  }

  // nav 滚动切回
  if (window.H5 && H5.initNavScroll) {
    setTimeout(() => H5.initNavScroll(), 100);
  }

  // 入场
  window.addEventListener('load', () => {
    if (!window.gsap) return;
    gsap.fromTo('.h5-profile-info',
      { y: 16, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }
    );
    gsap.fromTo('.h5-stats-strip',
      { y: 12, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.5, delay: 0.2, ease: 'power2.out' }
    );
    gsap.utils.toArray('.h5-menu-card, .h5-role-switcher').forEach((c, i) => {
      gsap.fromTo(c, { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.3 + i * 0.06, ease: 'power2.out' });
    });
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>消息中心 — 慈善会 | 慈商联营</title>
<link rel="stylesheet" href="../public/css/h5.css">
<style>
  .h5-msg-tabs {
    display: flex; gap: 8px;
    padding: 12px 16px;
    background: var(--h5-card);
    border-bottom: 1px solid var(--h5-divider);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .h5-msg-tabs::-webkit-scrollbar { display: none; }
  .h5-msg-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--h5-text-2);
    background: var(--h5-bg);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .h5-msg-tab.active {
    background: var(--h5-primary);
    color: #fff;
    font-weight: 600;
  }
  .h5-msg-tab .cnt { margin-left: 4px; font-size: 11px; opacity: 0.7; }

  .h5-msg-item {
    display: flex; gap: 12px;
    padding: 14px 16px;
    background: var(--h5-card);
    border-bottom: 1px solid var(--h5-divider);
    position: relative;
  }
  .h5-msg-item.unread {
    background: linear-gradient(90deg, rgba(14,90,111,0.05) 0%, transparent 60%);
  }
  .h5-msg-item.unread::before {
    content: "";
    position: absolute;
    left: 8px; top: 22px;
    width: 6px; height: 6px;
    background: var(--h5-primary);
    border-radius: 50%;
  }
  .h5-msg-item .ic {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .h5-msg-item .body { flex: 1; min-width: 0; }
  .h5-msg-item .head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px;
  }
  .h5-msg-item .t { font-size: 14px; font-weight: 600; }
  .h5-msg-item.unread .t { font-weight: 700; }
  .h5-msg-item .time { font-size: 11px; color: var(--h5-text-3); flex-shrink: 0; }
  .h5-msg-item .m {
    font-size: 12px;
    color: var(--h5-text-2);
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .h5-msg-item .actions {
    display: flex; gap: 6px;
    margin-top: 8px;
  }
  .h5-msg-banner {
    margin: 12px 16px 0;
    padding: 14px;
    background: linear-gradient(135deg, var(--h5-primary) 0%, var(--h5-primary-deep) 100%);
    color: #fff;
    border-radius: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .h5-msg-banner .ic { font-size: 28px; }
  .h5-msg-banner .body { flex: 1; }
  .h5-msg-banner .t { font-size: 14px; font-weight: 600; }
  .h5-msg-banner .d { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .h5-msg-banner .arrow { font-size: 18px; opacity: 0.7; }
</style>
</head>
<body data-role="charity" class="has-tabbar">

<div class="h5-nav">
  <div class="h5-nav-back" onclick="history.back()">‹</div>
  <div class="h5-nav-title">消息中心</div>
  <div class="h5-nav-right">
    <div class="h5-nav-icon" onclick="openMarkAll()">✓</div>
  </div>
</div>

<div class="h5-page" style="padding-top: 56px;">

  <!-- 角色 banner -->
  <div class="h5-msg-banner" id="roleBanner">
    <div class="ic">🏛</div>
    <div class="body">
      <div class="t">慈善会工作台 · 3 条未读</div>
      <div class="d">欢迎回来，王主任</div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- Tab 切换 -->
  <div class="h5-msg-tabs" id="tabs">
    <div class="h5-msg-tab active" data-tab="all">全部 <span class="cnt" id="cntAll">5</span></div>
    <div class="h5-msg-tab" data-tab="unread">未读 <span class="cnt" id="cntUnread">3</span></div>
    <div class="h5-msg-tab" data-tab="system">系统 <span class="cnt">1</span></div>
    <div class="h5-msg-tab" data-tab="task">任务 <span class="cnt">2</span></div>
    <div class="h5-msg-tab" data-tab="notice">公告 <span class="cnt">1</span></div>
    <div class="h5-msg-tab" data-tab="feedback">反馈 <span class="cnt">1</span></div>
  </div>

  <!-- 消息列表容器 -->
  <div id="msgList"></div>

  <div style="height: 24px;"></div>
</div>

<!-- 底部 tab bar -->
<div class="h5-tabbar">
  <div class="h5-tab" onclick="location.href='./dashboard.html'"><div class="tab-ic">🏠</div><div class="tab-label">工作台</div></div>
  <div class="h5-tab" onclick="location.href='./project-list.html'"><div class="tab-ic">📋</div><div class="tab-label">项目</div></div>
  <div class="h5-tab" onclick="location.href='./distribute.html'"><div class="tab-ic">🚚</div><div class="tab-label">派发</div></div>
  <div class="h5-tab" onclick="location.href='./volunteer-manage.html'"><div class="tab-ic">🤝</div><div class="tab-label">志愿者</div></div>
  <div class="h5-tab active" onclick="location.href='./messages.html'"><div class="tab-ic" style="position:relative;">🔔<span class="tab-badge">3</span></div><div class="tab-label">消息</div></div>
</div>

<div class="h5-modal-mask" id="tipModal">
  <div class="h5-modal">
    <div class="h5-modal-grabber"></div>
    <div class="h5-modal-head">
      <div class="title" id="tipTitle">提示</div>
      <div class="close" onclick="H5.closeModal('tipModal')">✕</div>
    </div>
    <div class="h5-modal-body" id="tipBody" style="padding:24px 20px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="../public/js/h5.js"></script>
<script>
  H5.setRole('charity');

  // 慈善会消息数据
  const MESSAGES = [
    { t: '云南昭通 3 批物资待审批', m: '美心食品集团 / 伊利集团 / 招商银行 提交了应急物资。', time: '刚刚', unread: true, ic: '🚨', bg: 'rgba(220,38,38,0.1)', col: '#DC2626', type: 'task', actions: ['立即审批', '查看'] },
    { t: '壹基金协同任务派发', m: '云南地震应急派发 5,000 件，需 3 名志愿者。', time: '1 小时前', unread: true, ic: '🤝', bg: 'rgba(14,90,111,0.1)', col: '#0E5A6F', type: 'task', actions: ['立即派发'] },
    { t: '5 月运营月报已生成', m: '本月 26 个项目，5,800 万元物资派发，0 损耗。', time: '今早 09:30', unread: true, ic: '📊', bg: 'rgba(14,90,111,0.1)', col: '#0E5A6F', type: 'system' },
    { t: '3 个新社会组织入驻申请', m: '深圳志愿者联合会 / 广州青年公益 / 珠海慈善义工 待审核。', time: '昨天 16:40', unread: false, ic: '🏢', bg: 'rgba(196,132,42,0.12)', col: '#C4842A', type: 'task', actions: ['查看', '批量处理'] },
    { t: '云南地震应急响应', m: '请及时协调 12 家企业资源，向 8,600 受惠者派发物资。', time: '06-01 10:00', unread: false, ic: '🌋', bg: 'rgba(220,38,38,0.1)', col: '#DC2626', type: 'notice', actions: ['立即响应'] },
    { t: '受捐者反馈：服务非常满意', m: '李华等 5 位受捐者对派发服务给予 5 星好评。', time: '05-30 14:20', unread: false, ic: '⭐', bg: 'rgba(20,184,166,0.12)', col: '#14B8A6', type: 'feedback', actions: ['查看'] }
  ];

  function renderMsgList(tab) {
    let filtered = MESSAGES;
    if (tab === 'unread') filtered = MESSAGES.filter(x => x.unread);
    else if (tab !== 'all') filtered = MESSAGES.filter(x => x.type === tab);

    const unreadCnt = MESSAGES.filter(x => x.unread).length;
    const totalCnt = MESSAGES.length;
    document.getElementById('cntAll').textContent = totalCnt;
    document.getElementById('cntUnread').textContent = unreadCnt;
    document.title = `消息中心(${unreadCnt}) — 慈商联营`;

    const container = document.getElementById('msgList');
    if (!filtered.length) {
      container.innerHTML =
        '<div style="text-align:center;padding:80px 32px;color:var(--h5-text-3);">' +
        '<div style="font-size:48px;margin-bottom:16px;">📭</div>' +
        '<div style="font-size:14px;">暂无消息</div></div>';
      return;
    }

    container.innerHTML = filtered.map((m, i) =>
      '<div class="h5-msg-item ' + (m.unread ? 'unread' : '') + '" data-i="' + i + '">' +
        '<div class="ic" style="background:' + m.bg + ';color:' + m.col + ';">' + m.ic + '</div>' +
        '<div class="body">' +
          '<div class="head">' +
            '<div class="t">' + m.t + '</div>' +
            '<div class="time">' + m.time + '</div>' +
          '</div>' +
          '<div class="m">' + m.m + '</div>' +
          (m.actions ? '<div class="actions">' + m.actions.map(a =>
            '<span class="h5-btn h5-btn-secondary h5-btn-sm" onclick="event.stopPropagation();openTip(\'' + a + '\',\'' + m.t.replace(/'/g, "\\'") + '\')">' + a + '</span>'
          ).join('') + '</div>' : '') +
        '</div>' +
      '</div>'
    ).join('');

    container.querySelectorAll('.h5-msg-item').forEach(el => {
      el.addEventListener('click', () => {
        const i = +el.dataset.i;
        const m = filtered[i];
        openTip('查看详情', m.t, m.m);
        el.classList.remove('unread');
        const idx = MESSAGES.findIndex(x => x === m);
        if (idx >= 0) MESSAGES[idx].unread = false;
      });
    });

    if (window.gsap) {
      gsap.fromTo('.h5-msg-item',
        { x: 20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, stagger: 0.05, ease: 'power2.out' }
      );
    }
  }

  function openMarkAll() {
    let cnt = 0;
    MESSAGES.forEach(m => { if (m.unread) { m.unread = false; cnt++; } });
    if (cnt === 0) {
      openTip('提示', '没有未读消息', '您已经处理完所有消息');
    } else {
      openTip('已全部已读', '已标记 ' + cnt + ' 条消息为已读', '所有消息已归档');
      setTimeout(() => renderMsgList(currentTab), 500);
    }
  }

  let currentTab = 'all';

  document.querySelectorAll('.h5-msg-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.h5-msg-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.tab;
      renderMsgList(currentTab);
    });
  });

  function openTip(t, d, ext) {
    document.getElementById('tipTitle').textContent = t;
    document.getElementById('tipBody').innerHTML =
      '<div style="text-align:center;"><div style="font-size:48px;margin-bottom:12px;">' + getMsgIcon(t) + '</div>' +
      '<div style="font-size:15px;font-weight:600;margin-bottom:8px;">' + d + '</div>' +
      (ext ? '<div style="font-size:13px;color:var(--h5-text-3);line-height:1.7;">' + ext + '</div>' : '') +
      '<button class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" style="margin-top:20px;" onclick="H5.closeModal(\'tipModal\')">知道了</button></div>';
    H5.openModal('tipModal');
  }

  function getMsgIcon(t) {
    if (t.includes('全部已读')) return '✓';
    if (t.includes('审批')) return '🚨';
    if (t.includes('派发')) return '🚚';
    if (t.includes('响应')) return '🤝';
    if (t.includes('详情')) return '📋';
    if (t.includes('完成')) return '✅';
    if (t.includes('查看')) return '🔍';
    return '💡';
  }

  renderMsgList('all');

  window.addEventListener('load', () => {
    if (!window.gsap) return;
    gsap.fromTo('.h5-msg-banner', { y: -10, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.h5-msg-tabs', { y: -8, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>注册 — 慈商联营</title>
<link rel="stylesheet" href="./public/css/h5.css">
<style>
  body { background: #fff; }
  .h5-auth-wrap { min-height: 100vh; padding: 16px 24px 40px; display: flex; flex-direction: column; }
  .h5-nav-row { display: flex; align-items: center; height: 44px; }
  .h5-nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .h5-nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
  .h5-nav-spacer { width: 32px; }
  .h5-progress-bar-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0 24px;
  }
  .h5-step {
    flex: 1; height: 4px; background: var(--h5-divider); border-radius: 2px; position: relative;
  }
  .h5-step.done { background: var(--h5-primary); }
  .h5-step-num {
    position: absolute; top: -22px; left: 0;
    width: 20px; height: 20px;
    border-radius: 10px;
    background: var(--h5-divider);
    color: var(--h5-text-3);
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .h5-step.done .h5-step-num { background: var(--h5-primary); color: #fff; }
  .h5-step-label {
    font-size: 11px;
    color: var(--h5-text-3);
    text-align: center;
    margin-top: 6px;
  }
  .h5-step.done + .h5-step-label { color: var(--h5-primary); font-weight: 600; }
  .h5-form-title {
    font-size: 22px; font-weight: 700;
    margin-bottom: 4px;
  }
  .h5-form-sub {
    font-size: 13px; color: var(--h5-text-3);
    margin-bottom: 24px;
  }
  .h5-input-icon { position: relative; }
  .h5-input-icon .h5-input { padding-left: 40px; }
  .h5-input-icon .ic {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-text-3);
    font-size: 18px;
  }
  .h5-input-extra {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-primary);
    font-size: 13px; font-weight: 500;
  }
  .h5-protocol {
    display: flex; align-items: flex-start; gap: 8px;
    margin: 8px 0 24px;
    font-size: 12px; color: var(--h5-text-2);
    line-height: 1.5;
  }
  .h5-protocol input { margin-top: 2px; width: 14px; height: 14px; accent-color: var(--h5-primary); flex-shrink: 0; }
  .h5-protocol a { color: var(--h5-primary); }
  .h5-role-grid-mini {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .h5-role-mini {
    padding: 14px 8px;
    background: var(--h5-bg);
    border-radius: 12px;
    text-align: center;
    border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .h5-role-mini.active {
    background: var(--h5-primary-soft);
    border-color: var(--h5-primary);
  }
  .h5-role-mini .ic { font-size: 24px; margin-bottom: 4px; }
  .h5-role-mini .name { font-size: 12px; font-weight: 600; }
  .h5-sms-row {
    display: flex; gap: 8px;
  }
  .h5-sms-row .h5-input-icon { flex: 1; }
  .h5-sms-row .h5-btn-sms {
    flex-shrink: 0;
    padding: 0 16px;
    background: var(--h5-primary-soft);
    color: var(--h5-primary);
    border-radius: var(--h5-radius-sm);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center;
  }
  .h5-sms-row .h5-btn-sms.disabled {
    background: var(--h5-divider);
    color: var(--h5-text-3);
  }
</style>
</head>
<body>

<div class="h5-auth-wrap">
  <!-- 顶部 nav -->
  <div class="h5-nav-row">
    <div class="h5-nav-back" onclick="history.back()">‹</div>
    <div class="h5-nav-title">注册</div>
    <div class="h5-nav-spacer"></div>
  </div>

  <!-- 步骤条 -->
  <div class="h5-progress-bar-row">
    <div class="h5-step done"><div class="h5-step-num">1</div></div>
    <div class="h5-step" id="step2"><div class="h5-step-num">2</div></div>
  </div>

  <!-- 步骤 1: 角色 + 手机号 -->
  <div id="step1Panel">
    <div class="h5-form-title">选择身份</div>
    <div class="h5-form-sub">不同身份对应不同工作台</div>

    <div class="h5-role-grid-mini" id="roleGrid">
      <div class="h5-role-mini active" data-role="volunteer">
        <div class="ic">🙋</div>
        <div class="name">志愿者</div>
      </div>
      <div class="h5-role-mini" data-role="recipient">
        <div class="ic">❤️</div>
        <div class="name">受捐者</div>
      </div>
      <div class="h5-role-mini" data-role="company">
        <div class="ic">🏢</div>
        <div class="name">企业</div>
      </div>
      <div class="h5-role-mini" data-role="charity">
        <div class="ic">慈</div>
        <div class="name">慈善会</div>
      </div>
      <div class="h5-role-mini" data-role="org">
        <div class="ic">社</div>
        <div class="name">社会组织</div>
      </div>
    </div>

    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">📱</span>
        <input type="tel" class="h5-input" id="phone" placeholder="请输入手机号" maxlength="11">
      </div>
    </div>

    <div class="h5-form-group">
      <div class="h5-sms-row">
        <div class="h5-input-icon">
          <span class="ic">🔑</span>
          <input type="text" class="h5-input" id="smsCode" placeholder="6 位验证码" maxlength="6">
        </div>
        <div class="h5-btn-sms" id="smsBtn" onclick="sendSms()">获取验证码</div>
      </div>
    </div>

    <div class="h5-protocol">
      <input type="checkbox" id="agreeChk" checked>
      <label for="agreeChk">我已阅读并同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></label>
    </div>

    <!-- 占位防止被 fixed 按钮遮挡 -->
    <div style="height: 100px;"></div>
  </div>

  <!-- 步骤 1 fixed bottom action -->
  <div class="h5-bottom-action" id="step1Action">
    <button class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" onclick="nextStep()">下一步</button>
  </div>

  <!-- 步骤 2: 设置密码 + 资料（简化）-->
  <div id="step2Panel" style="display:none;">
    <div class="h5-form-title">设置密码</div>
    <div class="h5-form-sub">密码需 8-20 位，含字母和数字</div>

    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">🔒</span>
        <input type="password" class="h5-input" id="password" placeholder="请输入密码">
      </div>
    </div>
    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">🔒</span>
        <input type="password" class="h5-input" id="password2" placeholder="请再次输入密码">
      </div>
    </div>

    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">👤</span>
        <input type="text" class="h5-input" id="realname" placeholder="请输入真实姓名">
      </div>
    </div>

    <div style="height: 100px;"></div>
  </div>

  <!-- 步骤 2 fixed bottom action -->
  <div class="h5-bottom-action" id="step2Action" style="display:none;">
    <button class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" onclick="doRegister()">完成注册</button>
    <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--h5-text-3);">
      <a href="javascript:void(0)" onclick="goBack()" style="color:var(--h5-text-3);">‹ 返回上一步</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="./public/js/h5.js"></script>
<script>
  let smsTimer = null;

  // 角色选择
  document.querySelectorAll('#roleGrid .h5-role-mini').forEach(r => {
    r.addEventListener('click', () => {
      document.querySelectorAll('#roleGrid .h5-role-mini').forEach(x => x.classList.remove('active'));
      r.classList.add('active');
      H5.setRole(r.dataset.role);
    });
  });

  function sendSms() {
    const phone = document.getElementById('phone').value;
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      alert('请输入正确的手机号');
      return;
    }
    const btn = document.getElementById('smsBtn');
    btn.classList.add('disabled');
    let s = 60;
    btn.textContent = s + 's 后重发';
    smsTimer = setInterval(() => {
      s--;
      if (s <= 0) {
        clearInterval(smsTimer);
        btn.classList.remove('disabled');
        btn.textContent = '获取验证码';
      } else {
        btn.textContent = s + 's 后重发';
      }
    }, 1000);
  }

  function nextStep() {
    // 原型：直接切到 step 2，不验证
    document.getElementById('step2').classList.add('done');
    if (window.gsap) {
      gsap.to('#step1Panel', { x: -30, opacity: 0, duration: 0.3, onComplete: () => {
        document.getElementById('step1Panel').style.display = 'none';
        const p = document.getElementById('step2Panel');
        p.style.display = '';
        document.getElementById('step1Action').style.display = 'none';
        document.getElementById('step2Action').style.display = '';
        gsap.fromTo(p, { x: 30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
      }});
    } else {
      document.getElementById('step1Panel').style.display = 'none';
      document.getElementById('step2Panel').style.display = '';
      document.getElementById('step1Action').style.display = 'none';
      document.getElementById('step2Action').style.display = '';
    }
  }

  function goBack() {
    if (window.gsap) {
      gsap.to('#step2Panel', { x: 30, opacity: 0, duration: 0.3, onComplete: () => {
        document.getElementById('step2Panel').style.display = 'none';
        const p = document.getElementById('step1Panel');
        p.style.display = '';
        document.getElementById('step2Action').style.display = 'none';
        document.getElementById('step1Action').style.display = '';
        document.getElementById('step2').classList.remove('done');
        gsap.fromTo(p, { x: -30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
      }});
    } else {
      document.getElementById('step2Panel').style.display = 'none';
      document.getElementById('step1Panel').style.display = '';
      document.getElementById('step2Action').style.display = 'none';
      document.getElementById('step1Action').style.display = '';
    }
  }

  function doRegister() {
    // 原型：直接跳 dashboard，不验证
    H5.setRole(H5.currentRole);
    location.href = `./${H5.currentRole}/dashboard.html?role=${H5.currentRole}`;
  }

  // 入场动效
  H5.fadeInUp('.h5-progress-bar-row, #step1Panel > *', {
    y: 16, opacity: 0, duration: 0.5, stagger: 0.06
  });
</script>
</body>
</html>

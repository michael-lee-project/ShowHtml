<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>UmakeX IM · AI Agent 原型</title>
  <link rel="stylesheet" href="css/base.css?v=17">
  <link rel="stylesheet" href="css/im.css?v=17">
  <link rel="stylesheet" href="css/spa.css?v=32">
  <style>
    /* hero：压缩为原型抬头，不再做营销大屏 */
    .hero {
      padding: 34px 0 16px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: end;
    }
    .hero .kicker { display: block; margin-bottom: 10px; }
    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      max-width: 680px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--accent-red);
    }
    .hero .sub {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 620px;
      margin-bottom: 0;
    }
    .hero .meta-row {
      display: flex; gap: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-2);
      letter-spacing: 0.05em;
      flex-wrap: wrap;
    }
    .hero .meta-row span { display: flex; align-items: center; gap: 4px; }
    .hero .meta-row strong { color: var(--accent-red); font-weight: 700; }
    .hero-brief {
      border-left: 3px solid var(--accent-red);
      padding: 12px 0 12px 18px;
      background: linear-gradient(90deg, rgba(255,59,48,0.06), transparent 72%);
    }
    .hero-brief .line {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      margin: 4px 0;
      letter-spacing: 0.02em;
    }
    .hero-brief strong { color: var(--ink); }

    /* 说明卡小数字 */
    .stat-row {
      display: flex; gap: 12px;
      margin-top: 20px;
    }
    .stat-pill {
      flex: 1;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #ebeef5;
      border-radius: 8px;
    }
    .stat-pill .num {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-red);
      display: block;
    }
    .stat-pill .lbl {
      font-size: 10px;
      color: var(--ink-2);
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* try 区 */
    .try-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .try-chip {
      padding: 4px 10px;
      background: var(--accent-red-3);
      color: var(--accent-red);
      border-radius: 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .try-chip:hover {
      background: #fff;
      border-color: var(--accent-red);
    }
  </style>
</head>
<body>

  <!-- ============================================
       Phone-only Prototype：只保留手机模型原型
       ============================================ -->
  <main class="phone-only-shell">
    <div class="phone-prototype-stage">
      <div class="phone-frame">
        <div class="phone-screen">

          <!-- 状态栏 -->
          <div class="phone-statusbar">
            <span id="phoneTime">14:23</span>
            <div class="right">
              <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
              <span>5G</span>
              <span class="battery"><b></b></span>
            </div>
          </div>

          <!-- 顶栏（动态） -->
          <div class="phone-header" id="phoneHeader">
            <div class="ph-back" id="phoneBack" style="display:none;">‹</div>
            <div class="ph-title" id="phoneTitle">消息</div>
            <div class="ph-action" id="phoneAction"></div>
          </div>

          <!-- 内容区（视图注入点） -->
          <div class="phone-content" id="phoneContent"></div>

          <!-- 5 tab 底栏：AI Agent Center 为一级入口 -->
          <nav class="phone-tabbar phone-tabbar-5">
            <div class="phone-tabbar-item active" data-tab="chat-list">
              <div class="pt-icon">💬</div><span>消息</span>
            </div>
            <div class="phone-tabbar-item" data-tab="contact">
              <div class="pt-icon">📒</div><span>通讯录</span>
            </div>
            <div class="phone-tabbar-item phone-tabbar-agent" data-tab="agent-center">
              <div class="pt-icon">AI</div><span>Agent Center</span>
            </div>
            <div class="phone-tabbar-item" data-tab="meeting-list">
              <div class="pt-icon">📅</div><span>会议</span>
            </div>
            <div class="phone-tabbar-item" data-tab="profile">
              <div class="pt-icon">👤</div><span>我的</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <!-- JS (defer + cache buster: 避免脚本阻塞解析 / 浏览器强缓存) -->
  <script defer src="js/mock-data.js?v=18"></script>
  <script defer src="js/mock-ai.js?v=18"></script>
  <script defer src="js/views-v30.js"></script>
  <script defer src="js/spa-v22.js"></script>
</body>
</html>

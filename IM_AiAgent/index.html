<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>UmakeX IM · AI Agent 原型</title>
  <link rel="stylesheet" href="css/base.css?v=17">
  <link rel="stylesheet" href="css/im.css?v=17">
  <link rel="stylesheet" href="css/spa-v42.css?v=42">
  <style>
    /* hero：压缩为原型抬头，不再做营销大屏 */
    .hero {
      padding: 34px 0 16px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: end;
    }
    .hero .kicker { display: block; margin-bottom: 10px; }
    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      max-width: 680px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--accent-red);
    }
    .hero .sub {
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 620px;
      margin-bottom: 0;
    }
    .hero .meta-row {
      display: flex; gap: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-2);
      letter-spacing: 0.05em;
      flex-wrap: wrap;
    }
    .hero .meta-row span { display: flex; align-items: center; gap: 4px; }
    .hero .meta-row strong { color: var(--accent-red); font-weight: 700; }
    .hero-brief {
      border-left: 3px solid var(--accent-red);
      padding: 12px 0 12px 18px;
      background: linear-gradient(90deg, rgba(255,59,48,0.06), transparent 72%);
    }
    .hero-brief .line {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      margin: 4px 0;
      letter-spacing: 0.02em;
    }
    .hero-brief strong { color: var(--ink); }

    /* 说明卡小数字 */
    .stat-row {
      display: flex; gap: 12px;
      margin-top: 20px;
    }
    .stat-pill {
      flex: 1;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #ebeef5;
      border-radius: 8px;
    }
    .stat-pill .num {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-red);
      display: block;
    }
    .stat-pill .lbl {
      font-size: 10px;
      color: var(--ink-2);
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* try 区 */
    .try-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .try-chip {
      padding: 4px 10px;
      background: var(--accent-red-3);
      color: var(--accent-red);
      border-radius: 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .try-chip:hover {
      background: #fff;
      border-color: var(--accent-red);
    }
  </style>
</head>
<body>

  <!-- ============================================
       Phone-only Prototype：只保留手机模型原型
       ============================================ -->
  <main class="phone-only-shell">
    <div class="phone-prototype-stage">
      <div class="phone-frame">
        <div class="phone-screen">

          <!-- 状态栏 -->
          <div class="phone-statusbar">
            <span id="phoneTime">14:23</span>
            <div class="right">
              <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
              <span>5G</span>
              <span class="battery"><b></b></span>
            </div>
          </div>

          <!-- 顶栏（动态） -->
          <div class="phone-header" id="phoneHeader">
            <div class="ph-back" id="phoneBack" style="display:none;">‹</div>
            <div class="ph-title" id="phoneTitle">消息</div>
            <div class="ph-action" id="phoneAction">
              <div class="bell" data-action="open-notification-center">
                🔔
                <div class="dot"></div>
              </div>
            </div>
          </div>

          <!-- 内容区（视图注入点） -->
          <div class="phone-content" id="phoneContent"></div>

          <!-- 5 tab 底栏：AI Agent Center 为一级入口 -->
          <nav class="phone-tabbar phone-tabbar-5">
            <div class="phone-tabbar-item active" data-tab="chat-list">
              <div class="pt-icon">💬</div><span>消息</span>
            </div>
            <div class="phone-tabbar-item" data-tab="contact">
              <div class="pt-icon">📒</div><span>通讯录</span>
            </div>
            <div class="phone-tabbar-item phone-tabbar-agent" data-tab="agent-center">
              <div class="pt-icon">AI</div><span>Agent Center</span>
            </div>
            <div class="phone-tabbar-item" data-tab="meeting-list">
              <div class="pt-icon">📅</div><span>会议</span>
            </div>
            <div class="phone-tabbar-item" data-tab="profile">
              <div class="pt-icon">👤</div><span>我的</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <!-- JS (defer + cache buster: 避免脚本阻塞解析 / 浏览器强缓存) -->
  <script defer src="js/mock-data-v2.js?v=18"></script>
  <script defer src="js/mock-ai.js?v=18"></script>
  <script defer src="js/views-v34.js?v=semiauto"></script>
  <script defer src="js/spa-v22.js?v=fix-route"></script>
  </script>
  <style>
/* === Hallmark 重新设计：AI Agent Center 紧凑卡片风格 === */
/* Hallmark · macrostructure: Workbench · tone: editorial · anchor hue: red (c8102e) */
.ac-hallmark-list {
  padding: 0 12px 4px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ac-hallmark-card {
  background: #ffffff !important;
  border: 1px solid #e5e7eb !important;
  border-left: 4px solid var(--ac-color, #c8102e) !important;
  border-radius: 6px;
  padding: 10px 12px;
  overflow: hidden;
}
.ac-hallmark-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.ac-hallmark-icon {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--ac-soft, #fee2e2);
  color: var(--ac-color, #c8102e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}
.ac-hallmark-title {
  flex: 1;
  min-width: 0;
}
.ac-hallmark-kicker {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ac-color, #c8102e);
  font-weight: 600;
  margin-bottom: 2px;
}
.ac-hallmark-title strong {
  display: block;
  font-size: 16px;
  color: #111111;
  font-weight: 600;
}
/* 开关 */
.ac-hallmark-toggle {
  flex-shrink: 0;
}
.ac-switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
}
.ac-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.ac-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #cccccc;
  transition: .2s;
  border-radius: 24px;
}
.ac-slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .2s;
  border-radius: 50%;
}
input:checked + .ac-slider {
  background-color: var(--ac-color, #c8102e);
}
input:checked + .ac-slider:before {
  transform: translateX(20px);
}
/* 描述 */
.ac-hallmark-desc {
  font-size: 13px;
  line-height: 1.5;
  color: #4b5563;
  margin: 0 0 8px;
}
/* 能力场景标签 */
.ac-hallmark-scenes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.ac-hallmark-scenes span {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--ac-soft, #fee2e2);
  color: var(--ac-color, #c8102e);
}
/* 进入配置按钮 */
.ac-hallmark-btn {
  width: 100%;
  padding: 6px 0;
  border-radius: 6px;
  border: 1px solid var(--ac-color, #c8102e);
  background: #ffffff;
  color: var(--ac-color, #c8102e);
  font-size: 13px;
  font-weight: 500;
}
.ac-hallmark-btn:active {
  background: var(--ac-soft, #fee2e2);
}
/* 合并 stats 到头部数字 */
.ac-mag-number small {
  font-size: 12px;
  color: #9ca3af;
  font-weight: 400;
  margin-left: 2px;
}
/* 通讯录搜索栏背景修改 */
.contact-mkt-search {
  background: #ffffff !important;
}
.contact-mkt-search .search-input,
.contact-mkt-search .contact-search-input {
  background: #ffffff !important;
}
/* contact-mkt-stats 去掉边框 */
.contact-mkt-stats {
  border: none !important;
}
/* 消息页面气泡改成圆角，去掉直角 */
.ai-demo-chat .msg-row .msg-content {
  border-radius: 12px !important;
}
.ai-demo-chat .msg-row.me .msg-content {
  border-bottom-right-radius: 4px !important;
}
.ai-demo-chat .msg-row.other .msg-content {
  border-bottom-left-radius: 4px !important;
}
/* 列表页消息卡片也改成圆角 */
.item-msg {
  border-radius: 12px !important;
}
/* 会话详情气泡 */
.bubble {
  border-radius: 12px !important;
}
.bubble.me {
  border-bottom-right-radius: 4px !important;
}
.bubble.them {
  border-bottom-left-radius: 4px !important;
}
/* 营销案例条目 */
.list-item.marketing-case-item,
.list-item.marketing-case-item.hot {
  border-radius: 12px !important;
}
/* 全局AI悬浮球定位修正（手机框内） */
.phone-frame {
  position: relative !important;
}
#phoneContent {
  position: relative !important;
}
.global-ai-ball {
  position: absolute !important;
  bottom: 80px !important;
  right: 16px !important;
  display: block !important;
  z-index: 999 !important;
}
/* === 半自动化场景：AI输出3个可选思路 === */
.semi-options-bubble {
  background: #ffffff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  padding: 10px 12px !important;
  max-width: 85% !important;
}
.semi-options-bubble b {
  display: block !important;
  font-size: 13px !important;
  color: #374151 !important;
  margin-bottom: 8px !important;
  font-weight: 500 !important;
}
.semi-options-list {
  display: flex !important;
  flex-direction: column !important;
  gap: 6px !important;
}
.semi-option-item {
  text-align: left !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 8px !important;
  padding: 10px 12px !important;
  background: #f9fafb !important;
  cursor: pointer !important;
  transition: all .2s !important;
}
.semi-option-item:hover {
  border-color: #c8102e !important;
  background: #fff1f2 !important;
}
.semi-option-item.selected {
  border-color: #c8102e !important;
  background: #c8102e !important;
}
.semi-option-item.selected .opt-text {
  color: #ffffff !important;
}
.semi-option-item .opt-text {
  font-size: 14px !important;
  color: #111827 !important;
  line-height: 1.4 !important;
}
.semi-option-item i {
  display: none !important;
}
  </style>
</body>
</html>

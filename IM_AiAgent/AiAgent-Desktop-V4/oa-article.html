<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMC 公众号文章阅读</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/shell.css" />
  <link rel="stylesheet" href="assets/css/official-account.css" />
</head>
<body data-page="article">
  <div class="window">

    <!-- ========== 标题栏 ========== -->
    <div class="titlebar">
      <div class="titlebar__lights">
        <span class="titlebar__light titlebar__light--close"></span>
        <span class="titlebar__light titlebar__light--min"></span>
        <span class="titlebar__light titlebar__light--max"></span>
      </div>
      <div class="titlebar__title" id="titleBarText">UMC · 公众号文章阅读</div>
    </div>

    <!-- ========== 主体 ========== -->
    <div class="window__body">

      <!-- 左侧深色导航栏（6 图标） -->
      <aside class="sidebar">
        <a href="messages.html" class="sidebar__avatar" title="我的">
          <span>MK</span>
        </a>
        <nav class="sidebar__nav">
          <a href="messages.html" class="sidebar__item" title="消息" data-nav="messages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16v11a2 2 0 0 1-2 2H9l-5 4z"/></svg>
          </a>
          <a href="contacts.html" class="sidebar__item" title="通讯录" data-nav="contacts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M5 17c.5-1.8 2.2-3 4-3s3.5 1.2 4 3"/><path d="M15 9h4M15 13h3"/></svg>
          </a>
          <a href="official-account.html" class="sidebar__item is-active" title="公众号" data-nav="official">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M8 11h8M8 15h5"/></svg>
          </a>
          <a href="agent-workstation.html" class="sidebar__item" title="AI Agent 协同工作台" data-nav="agent-workstation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="3"/><path d="M5 21v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1"/><circle cx="12" cy="7" r="1" fill="currentColor"/></svg>
          </a>
          <a href="compute-center.html" class="sidebar__item" title="算力中心" data-nav="compute">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 7v10l8 5 8-5V7z"/><path d="M12 2v20M4 7l16 10M20 7 4 17"/></svg>
          </a>
          <a href="profile.html" class="sidebar__item" title="我的" data-nav="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </a>
        </nav>
        <div class="sidebar__logo" title="UMakex">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
        </div>
      </aside>

      <!-- ========== 主区：文章详情 ========== -->
      <main class="oa">
        <div class="oa__inner">

          <!-- 顶部 nav 切换（高亮"文章"tab） -->
          <nav class="oa__nav">
            <a href="official-account.html" class="oa__nav-item" data-nav="home">
              <span class="oa__nav-icon">🏠</span>
              <span>主页</span>
            </a>
            <a href="oa-articles.html" class="oa__nav-item is-active" data-nav="articles">
              <span class="oa__nav-icon">📰</span>
              <span>文章</span>
              <span class="oa__nav-count">328</span>
            </a>
            <a href="oa-analytics.html" class="oa__nav-item" data-nav="analytics">
              <span class="oa__nav-icon">📊</span>
              <span>数据</span>
            </a>
            <a href="oa-menu.html" class="oa__nav-item" data-nav="menu">
              <span class="oa__nav-icon">⚙️</span>
              <span>菜单</span>
            </a>
          </nav>

          <!-- 文章主体（JS 动态注入） -->
          <article class="oa__article-detail" id="articleDetail">
            <!-- JS 渲染 -->
          </article>

        </div>
      </main>

    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/oa.js"></script>
</body>
</html>
